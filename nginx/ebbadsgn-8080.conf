# /etc/nginx/sites-available/ebbadsgn-8080.conf
#
# Statisk sajt (ebbadsgn) på port 8080 tills egen domän + SSL sätts upp.
# Taxiingo använder 80/443 — denna block krockar inte med taxiingo.se.
#
# Aktivera på servern:
#   sudo cp .../ebbadsgn-8080.conf /etc/nginx/sites-available/ebbadsgn-8080.conf
#   sudo ln -sf /etc/nginx/sites-available/ebbadsgn-8080.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Brandvägg (om 8080 inte redan är öppen):
#   sudo ufw allow 8080/tcp
#
# Rättigheter på webbrot (vanlig 403-fix):
#   sudo chown -R www-data:www-data /var/www/ebbadsgn
#   sudo find /var/www/ebbadsgn -type d -exec chmod 755 {} \;
#   sudo find /var/www/ebbadsgn -type f -exec chmod 644 {} \;
#
# Första deploy av repot på VPS (en gång):
#   sudo mkdir -p /var/www && cd /var/www
#   sudo git clone https://github.com/gullmanfredrik-sudo/ebbadsgn.git ebbadsgn
#   (justera URL om repot flyttas)

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /var/www/ebbadsgn;
    index index.html;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
